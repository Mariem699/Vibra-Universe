<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Vibra</title>
<link rel="stylesheet" href="style.css">
<script type="text/javascript">
var lastetype="";
function hidePopup() {
    var popup = document.getElementById("popup");
    popup.style.top = "-150px";
	if(lastetype==="success"){
		window.location.href = "index.html";
	}
}
function showPopup(message, type)
{
    var popup = document.getElementById("popup");
    var text = document.getElementById("popup-message");
	lastetype=type;
    popup.className = "popup " + type; 
    text.innerText = message;
    popup.style.top = "0px"; 	
}

function checkForm(){

	var email=document.getElementById("email").value.trim();
	var password=document.getElementById("password").value.trim();
	
	if (email==="" && password==="")
	{
		showPopup("⚠️Form is empty! Please fill out the form⚠️","error");
		return false;}
		

	if(email === "") {
          showPopup("⚠️Please enter your email⚠️","error");
          return false;
      }
    if(email.indexOf("@") === -1 || email.indexOf(".") === -1) {
          showPopup("⚠️Please enter a valid email address⚠️","error");
          return false;}
	  
	  
    if(password === "") {
          showPopup("⚠️Please enter your password⚠️","error");
          return false;
      }			
	showPopup("Welcome Back! 🎶","success");
    
    return true;
		
}
function gosign(){
	window.location.href ="signup.html";
}
</script>
</head>
<body class="form" >
<header>
	<nav>
    <a href="index.html"><img src="img/loogo.png" alt="Logo" id="logoimage"></a>
	<div class="menu">
		<a href="contact.html">Contact</a>
	</div>
	</nav>

<div class="popup" id="popup">
  <p id="popup-message"></p>
  <button onclick="hidePopup()">OK</button>
</div> 	
 </header>
 
<main>
<div class="head">
    <h1 class="special-text">Welcome Back🎶</h1>
</div>

<form class="form-box">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter Your Email"  />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter Your Password" />

    <button type="button"class="btn-login" onclick="checkForm()">Login</button>

    <p class="text-small">Don’t have an account?</p>
	<button class="btn-sign" type="button" onclick="gosign()">Sign Up</button>
    
</form>
</main>
 </body>
 </html>
