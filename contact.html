<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibra Universe — Contact</title>
  <link rel="stylesheet" href="style.css" />
  
 <script>

var lastetype="";
function hidePopup() {
    var popup = document.getElementById("popup");
    popup.style.top = "-150px";
	if(lastetype==="success"){
		window.location.href = "index.html";
	}
}
function showPopup(message, type)
{
    var popup = document.getElementById("popup");
    var text = document.getElementById("popup-message");
	lastetype=type;
    popup.className = "popup " + type; 
    text.innerText = message;
     popup.style.top = "0px"; 	
}
function checkForm() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();
	if (name==="" && email==="" && message===""){
		showPopup("⚠️Form is empty! Please fill out the form⚠️","error");
		return false;}
    if(name === "") {
        showPopup("⚠️Please enter your name⚠️","error");
        return false;
    }

    if(email === "") {
        showPopup("⚠️Please enter your email⚠️","error");
        return false;
    }

    if (email.indexOf("@") == -1 || email.indexOf(".") == -1) {
		showPopup("⚠️Please enter a valid email address⚠️","error");
		return false

    }
    if(message === "") {
        showPopup("⚠️Please enter your message⚠️","error");
        return false;
    }

    showPopup("Thanks! Your message has been sended successfully 🎶", "success");
	
	return true;
}
</script>
  
</head>
<body class="form">
<header>
	<nav>
	<div class="logo-contact">
    <a href="index.html"><img src="img/loogo.png" alt="Logo" id="logoimage"></a>
	</div>
	</nav>
	<div class="header-text">
        <h1 class="special-text">🎶 Vibra 🎶</h1>
        <p class="text">Have a question, suggestion, or just want to say hi? Drop us a message and let the vibes flow! 🎵</p>
    </div>
<div class="popup" id="popup">
  <p id="popup-message"></p>
  <button onclick="hidePopup()">OK</button>
</div>
</header>
<main>

    <form class="form-box">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Your Name" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter Your First Email" />

        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="Enter...."></textarea>
		<button class="btn-sign" type="button" onclick="checkForm()">Send</button>
        
    </form>
</main>  
  <footer>
	<div class="social">
      <img src="img/facebook.png" alt="Facebook" class="icon">
      <img src="img/instagram.png" alt="Instagram" class="icon">
      <img src="img/playstore.png" alt="Play Store" class="icon">
    </div>
	<p>&copy;2025🎶<strong>Vibra</strong>🎶 Made with ❤️ for music lovers.</p>
  </footer>
</body>
</html>
