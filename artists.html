function displayArtists(containerId, artists) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  artists.forEach(artist => {
    const link = document.createElement('a');       
    link.href = artist.page || "#";                 
    link.target = "_blank";                         

    const card = document.createElement('div');
    card.className = 'artist';

    const img = document.createElement('img');
    img.src = artist.img;
    img.alt = artist.name;
    img.onerror = () => img.src = "https://via.placeholder.com/220?text=No+Image";

    const caption = document.createElement('p');
    caption.textContent = artist.name;

    card.appendChild(img);
    card.appendChild(caption);
    link.appendChild(card);       
    container.appendChild(link);
  });
}

window.onload = () => {
  displayArtists("pop-artists", artistsData.Pop);
  displayArtists("rap-artists", artistsData.Rap);
  displayArtists("afrobeats-artists", artistsData.HipHop);
  displayArtists("jazz-artists", artistsData.Jazz);
  displayArtists("arabic-artists", artistsData.Arabic);
};
